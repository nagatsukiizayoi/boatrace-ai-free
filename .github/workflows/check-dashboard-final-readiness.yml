name: Check Dashboard Final Readiness

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dashboard-final-readiness:
    name: Dashboard Final Readiness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs
          ls -la scripts
          ls -la .github/workflows

      - name: Check required files
        run: |
          test -f docs/index.html
          test -f docs/healthcheck.html
          test -f docs/prediction.json
          test -f scripts/check_dashboard_final_readiness.py
          test -f .github/workflows/check-dashboard-final-readiness.yml

      - name: Validate prediction JSON syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null
          echo "prediction.json syntax: OK"

      - name: Compile final readiness checker
        run: |
          python -m py_compile scripts/check_dashboard_final_readiness.py

      - name: Run STEP 100 dashboard final readiness check
        run: |
          python scripts/ensure_prediction_json_dashboard_compat.py
          python scripts/check_dashboard_final_readiness.py
          python -m py_compile scripts/check_readme_dashboard_readiness_doc.py
          python scripts/check_readme_dashboard_readiness_doc.py
