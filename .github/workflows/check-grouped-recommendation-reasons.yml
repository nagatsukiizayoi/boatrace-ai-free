name: Check Grouped Recommendation Reasons

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  grouped-recommendation-reasons:
    name: Grouped Recommendation Reasons
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs
          ls -la scripts
          ls -la .github/workflows

      - name: Check required files
        run: |
          test -f docs/index.html
          test -f docs/prediction.json
          test -f scripts/check_grouped_recommendation_reasons.py
          test -f scripts/check_recommendation_reasons.py
          test -f scripts/check_dashboard_recommendation_reasons.py
          test -f .github/workflows/check-grouped-recommendation-reasons.yml

      - name: Validate prediction JSON syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null
          echo "prediction.json syntax: OK"

      - name: Compile grouped recommendation reason checkers
        run: |
          python -m py_compile scripts/check_grouped_recommendation_reasons.py
          python -m py_compile scripts/check_recommendation_reasons.py
          python -m py_compile scripts/check_dashboard_recommendation_reasons.py

      - name: Run STEP 91 recommendation reason validation
        run: |
          python scripts/check_recommendation_reasons.py

      - name: Run STEP 93 dashboard recommendation reason validation
        run: |
          python scripts/check_dashboard_recommendation_reasons.py

      - name: Run STEP 95 grouped recommendation reason validation
        run: |
          python scripts/check_grouped_recommendation_reasons.py
