name: Check Odds Import

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-odds-import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la db || true
          ls -la scripts || true
          ls -la data/import || true

      - name: Check required files
        run: |
          test -f db/schema.sql
          test -f scripts/init_db.py
          test -f scripts/patch_step68_schema.py
          test -f scripts/import_race_csv.py
          test -f scripts/import_odds_csv.py
          test -f data/import/races.csv
          test -f data/import/race_entries.csv
          test -f data/import/odds.csv

      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/init_db.py
          python -m py_compile scripts/patch_step68_schema.py
          python -m py_compile scripts/import_race_csv.py
          python -m py_compile scripts/import_odds_csv.py

      - name: Initialize SQLite database
        run: |
          python scripts/init_db.py --reset

      - name: Apply STEP 68 schema patch
        run: |
          python scripts/patch_step68_schema.py

      - name: Import race CSV
        run: |
          python scripts/import_race_csv.py

      - name: Import odds CSV
        run: |
          python scripts/import_odds_csv.py

      - name: Validate imported odds
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          db_path = Path("db/boatrace.sqlite3")

          if not db_path.exists():
              raise SystemExit("Database does not exist: db/boatrace.sqlite3")

          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row

          expected_min_counts = {
              "venues": 1,
              "races": 2,
              "racers": 12,
              "race_entries": 12,
              "odds_snapshots": 18,
          }

          for table, min_count in expected_min_counts.items():
              count = conn.execute(f"SELECT COUNT(*) AS c FROM {table}").fetchone()["c"]
              print(f"{table}: {count}")
              if count < min_count:
                  raise SystemExit(
                      f"{table} count is too small: expected >= {min_count}, actual {count}"
                  )

          allowed_bet_types = {
              "tansho",
              "fukusho",
              "2rentan",
              "2renfuku",
              "3rentan",
              "3renfuku",
              "kakuren",
              "unknown",
          }

          rows = conn.execute("""
              SELECT bet_type, COUNT(*) AS c
              FROM odds_snapshots
              GROUP BY bet_type
              ORDER BY bet_type
          """).fetchall()

          print("\nOdds count by bet_type:")
          actual_bet_types = set()

          for row in rows:
              bet_type = row["bet_type"]
              actual_bet_types.add(bet_type)
              print(f"- {bet_type}: {row['c']}")

              if bet_type not in allowed_bet_types:
                  raise SystemExit(f"Invalid bet_type found: {bet_type}")

          required_bet_types = {
              "tansho",
              "fukusho",
              "2rentan",
              "2renfuku",
              "3rentan",
              "3renfuku",
          }

          missing_bet_types = sorted(required_bet_types - actual_bet_types)
          if missing_bet_types:
              raise SystemExit(f"Missing required bet_types: {missing_bet_types}")

          invalid_odds = conn.execute("""
              SELECT COUNT(*) AS c
              FROM odds_snapshots
              WHERE odds IS NULL OR odds <= 0
          """).fetchone()["c"]

          if invalid_odds:
              raise SystemExit(f"Invalid odds rows found: {invalid_odds}")

          races_with_odds = conn.execute("""
              SELECT COUNT(DISTINCT race_id) AS c
              FROM odds_snapshots
          """).fetchone()["c"]

          print(f"\nRaces with odds: {races_with_odds}")

          if races_with_odds < 2:
              raise SystemExit(f"races_with_odds is too small: {races_with_odds}")

          fk_rows = conn.execute("PRAGMA foreign_key_check;").fetchall()
          if fk_rows:
              print("Foreign key check: NG")
              for row in fk_rows:
                  print(dict(row))
              raise SystemExit(1)

          print("Foreign key check: OK")

          conn.close()
          PY

      - name: Show odds preview
        run: |
          python - <<'PY'
          import sqlite3

          conn = sqlite3.connect("db/boatrace.sqlite3")
          conn.row_factory = sqlite3.Row

          rows = conn.execute("""
              SELECT
                  r.race_date,
                  v.venue_code,
                  v.venue_name,
                  r.race_no,
                  o.bet_type,
                  o.combination,
                  o.odds,
                  o.popularity,
                  o.captured_at,
                  o.source
              FROM odds_snapshots o
              JOIN races r ON r.id = o.race_id
              JOIN venues v ON v.id = r.venue_id
              ORDER BY r.race_date, v.venue_code, r.race_no, o.bet_type, o.popularity
              LIMIT 20
          """).fetchall()

          for row in rows:
              print(
                  row["race_date"],
                  row["venue_code"],
                  row["venue_name"],
                  f'{row["race_no"]}R',
                  row["bet_type"],
                  row["combination"],
                  f'odds={row["odds"]}',
                  f'popularity={row["popularity"]}',
                  row["source"],
              )

          conn.close()
          PY

      - name: STEP 77 check
        run: |
          echo "STEP 77 CHECK: OK"
