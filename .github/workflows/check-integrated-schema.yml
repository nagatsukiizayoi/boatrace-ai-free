name: Check Integrated Schema

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrated-schema:
    name: Integrated Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: STEP 105 smoke check
        run: |
          python --version
          test -f db/schema.sql
          test -f scripts/check_integrated_schema.py
          echo "STEP 105 CHECK: OK"
