name: Check Integrated Schema

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integrated-schema:
    name: Integrated Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la db
          ls -la scripts
          ls -la data/import
          ls -la docs

      - name: Check required files
        run: |
          test -f db/schema.sql
          test -f scripts/init_db.py
          test -f scripts/check_integrated_schema.py
          test -f scripts/export_integrated_schema.py
          test -f scripts/import_race_csv.py
          test -f scripts/import_odds_csv.py
          test -f scripts/generate_simple_predictions.py
          test -f scripts/apply_odds_to_predictions.py
          test -f scripts/create_expected_value_alerts.py
          test -f scripts/export_prediction_json.py
          test -f scripts/enrich_prediction_json.py
          test -f scripts/enrich_recommendation_reasons.py
          test -f scripts/check_recommendation_reasons.py
          test -f scripts/check_dashboard_final_readiness.py
          test -f data/import/races.csv
          test -f data/import/race_entries.csv
          test -f data/import/odds.csv
          test -f docs/index.html
          test -f docs/healthcheck.html

      - name: Compile integrated schema checker
        run: |
          python -m py_compile scripts/check_integrated_schema.py
          python -m py_compile scripts/check_dashboard_final_readiness.py

      - name: Run STEP 104 integrated schema validation
        run: |
          python scripts/check_integrated_schema.py

      - name: Run final readiness check
        run: |
          python scripts/check_dashboard_final_readiness.py

      - name: STEP 105 check
        run: echo "STEP 105 CHECK: OK"
