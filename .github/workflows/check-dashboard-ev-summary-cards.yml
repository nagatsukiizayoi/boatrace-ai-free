name: Check Dashboard EV Summary Cards

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dashboard-ev-summary-cards:
    name: Dashboard EV Summary Cards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs
          ls -la scripts
          ls -la .github/workflows

      - name: Check required files
        run: |
          test -f docs/index.html
          test -f docs/prediction.json
          test -f scripts/check_dashboard_ev_summary_cards.py
          test -f .github/workflows/check-dashboard-ev-summary-cards.yml

      - name: Validate prediction JSON syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null
          echo "prediction.json syntax: OK"

      - name: Compile STEP 89 checker
        run: |
          python -m py_compile scripts/check_dashboard_ev_summary_cards.py

      - name: Run STEP 89 dashboard EV summary validation
        run: |
          python scripts/check_dashboard_ev_summary_cards.py
