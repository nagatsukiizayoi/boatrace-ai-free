name: Check Healthcheck EV Summary

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-healthcheck-ev-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs
          ls -la scripts

      - name: Check required files
        run: |
          test -f docs/healthcheck.html
          test -f docs/prediction.json
          test -f scripts/patch_healthcheck_ev_summary.py

      - name: Validate healthcheck STEP86 markers
        run: |
          python - <<'PY'
          from pathlib import Path

          html = Path("docs/healthcheck.html").read_text(encoding="utf-8")

          required_tokens = [
              "STEP86_EV_HEALTHCHECK_STYLE",
              "STEP86_EV_HEALTHCHECK_HTML",
              "STEP86_EV_HEALTHCHECK_SCRIPT",
              "expected_value",
              "odds",
          ]

          missing = [t for t in required_tokens if t not in html]
          if missing:
              raise SystemExit(f"Missing tokens in docs/healthcheck.html: {missing}")

          print("Healthcheck STEP86 markers: OK")
          PY

      - name: Validate prediction JSON syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null

      - name: Validate prediction JSON EV data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("docs/prediction.json").read_text(encoding="utf-8"))

          races = data.get("races", [])
          alerts = data.get("alerts", [])

          if not isinstance(races, list) or not races:
              raise SystemExit("races must be a non-empty list")

          if not isinstance(alerts, list):
              raise SystemExit("alerts must be a list")

          recommendations = []

          for race in races:
              for rec in race.get("recommendations", []):
                  recommendations.append(rec)

          if not recommendations:
              raise SystemExit("No recommendations found")

          odds_count = 0
          ev_count = 0
          high_ev_count = 0
          max_ev = 0.0
          max_odds = 0.0

          for rec in recommendations:
              odds = rec.get("odds")
              ev = rec.get("expected_value")

              try:
                  odds_f = float(odds)
              except (TypeError, ValueError):
                  odds_f = 0.0

              try:
                  ev_f = float(ev)
              except (TypeError, ValueError):
                  ev_f = 0.0

              if odds_f > 0:
                  odds_count += 1
                  max_odds = max(max_odds, odds_f)

              if ev_f > 0:
                  ev_count += 1
                  max_ev = max(max_ev, ev_f)

              if ev_f >= 1.2:
                  high_ev_count += 1

          alert_text = json.dumps(alerts, ensure_ascii=False)
          expected_value_alert_count = 0

          for alert in alerts:
              s = json.dumps(alert, ensure_ascii=False)
              if "期待値" in s or "expected_value" in s or "EV" in s:
                  expected_value_alert_count += 1

          print("races:", len(races))
          print("alerts:", len(alerts))
          print("recommendations:", len(recommendations))
          print("odds_count:", odds_count)
          print("ev_count:", ev_count)
          print("high_ev_count:", high_ev_count)
          print("expected_value_alert_count:", expected_value_alert_count)
          print("max_ev:", max_ev)
          print("max_odds:", max_odds)

          if odds_count < 1:
              raise SystemExit("No recommendation with odds > 0")

          if ev_count < 1:
              raise SystemExit("No recommendation with expected_value > 0")

          if high_ev_count < 1:
              raise SystemExit("No recommendation with expected_value >= 1.2")

          if expected_value_alert_count < 1:
              raise SystemExit("No expected value alert found")

          print("Prediction JSON EV data: OK")
          PY

      - name: STEP 87 check
        run: echo "STEP 87 CHECK: OK"
