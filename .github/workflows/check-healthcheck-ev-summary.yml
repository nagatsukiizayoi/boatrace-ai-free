name: Check Healthcheck EV Summary

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  healthcheck-ev-summary:
    name: Healthcheck EV Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs
          ls -la scripts
          ls -la .github/workflows

      - name: Check required files
        run: |
          test -f docs/healthcheck.html
          test -f docs/prediction.json
          test -f scripts/check_healthcheck_ev_summary.py
          test -f .github/workflows/check-healthcheck-ev-summary.yml

      - name: Compile STEP 87 checker
        run: |
          python -m py_compile scripts/check_healthcheck_ev_summary.py

      - name: Run STEP 87 healthcheck EV summary validation
        run: |
          python -m py_compile scripts/ensure_prediction_json_dashboard_compat.py
          python scripts/ensure_prediction_json_dashboard_compat.py
          python scripts/check_healthcheck_ev_summary.py
