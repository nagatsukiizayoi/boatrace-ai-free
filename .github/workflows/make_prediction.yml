name: Make Prediction JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  make-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Make prediction JSON
        run: python src/make_prediction.py

      - name: Commit prediction files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/prediction.json
          git add docs/prediction_*.json || true
          git add docs/prediction_runs.json || true
          git commit -m "Update prediction files" || echo "No changes to commit"
          git push


      - name: Build database with sample data
        run: |
          python scripts/build_database.py --reset --with-sample-data

      - name: Run full prediction pipeline
        run: |
          python scripts/run_full_prediction_pipeline.py

      - name: Validate prediction JSON syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null

      - name: Check prediction JSON structure
        run: |
          python -m py_compile scripts/check_prediction_json_structure.py
          python scripts/check_prediction_json_structure.py

      - name: Check prediction run summary structure
        run: |
          python -m py_compile scripts/check_prediction_run_summary_structure.py
          python scripts/check_prediction_run_summary_structure.py

      - name: Check prediction outputs consistency
        run: |
          python -m py_compile scripts/check_prediction_outputs_consistency.py
          python scripts/check_prediction_outputs_consistency.py


      - name: Check make prediction outputs readiness
        run: |
          python -m py_compile scripts/check_make_prediction_outputs_ready.py
          python scripts/check_make_prediction_outputs_ready.py

      - name: Check README make prediction documentation
        run: |
          python -m py_compile scripts/check_readme_make_prediction_doc.py
          python scripts/check_readme_make_prediction_doc.py

      - name: Check README make prediction badge
        run: |
          python -m py_compile scripts/check_readme_make_prediction_badge.py
          python scripts/check_readme_make_prediction_badge.py
