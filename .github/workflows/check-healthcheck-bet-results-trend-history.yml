name: Check Healthcheck Bet Results Trend History

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  healthcheck-bet-results-trend-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify required files
        run: |
          test -f docs/healthcheck.html
          test -f docs/bet_results_summary_history.json
          test -f scripts/check_healthcheck_bet_results_trend_history.py

      - name: Validate JSON syntax
        run: |
          python -m json.tool docs/bet_results_summary_history.json > /dev/null

      - name: Compile checker
        run: |
          python -m py_compile scripts/check_healthcheck_bet_results_trend_history.py

      - name: Run STEP 145 checker
        run: |
          python scripts/check_healthcheck_bet_results_trend_history.py
