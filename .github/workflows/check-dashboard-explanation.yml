name: Check Dashboard Explanation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-dashboard-explanation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show environment
        run: |
          python --version
          pwd
          ls -la
          ls -la docs || true
          ls -la scripts || true

      - name: Check required files
        run: |
          test -f docs/index.html
          test -f docs/prediction.json
          test -f scripts/enrich_prediction_json.py
          test -f scripts/patch_index_score_explanation.py

      - name: Validate index.html contains STEP 74 panel
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/index.html")
          html = path.read_text(encoding="utf-8")

          required_tokens = [
              "STEP74_SCORE_EXPLANATION_STYLE",
              "STEP74_SCORE_EXPLANATION_HTML",
              "STEP74_SCORE_EXPLANATION_SCRIPT",
              "step74ScoreExplanationPanel",
              "step74ScoreStatus",
              "step74ScoreContent",
              "step74LoadScoreExplanations",
              "score_explanation",
              "score_details",
              "予想スコア説明",
          ]

          missing = [token for token in required_tokens if token not in html]

          if missing:
              raise SystemExit(f"Missing STEP74 dashboard tokens: {missing}")

          print("docs/index.html STEP74 panel: OK")
          print(f"index.html size: {path.stat().st_size} bytes")
          PY

      - name: Validate prediction.json syntax
        run: |
          python -m json.tool docs/prediction.json > /dev/null

      - name: Validate prediction.json explanations
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/prediction.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          required_top_keys = [
              "updated_at",
              "run_key",
              "model_name",
              "model_version",
              "target_date",
              "summary",
              "races",
              "alerts",
              "explainability",
          ]

          missing = [key for key in required_top_keys if key not in data]
          if missing:
              raise SystemExit(f"Missing top-level keys: {missing}")

          explainability = data.get("explainability")
          if not isinstance(explainability, dict):
              raise SystemExit("explainability must be an object")

          if explainability.get("enabled") is not True:
              raise SystemExit("explainability.enabled must be true")

          if explainability.get("method") != "simple_rule_score_v1":
              raise SystemExit(
                  f"Unexpected explainability.method: {explainability.get('method')}"
              )

          races = data.get("races")
          if not isinstance(races, list):
              raise SystemExit("races must be a list")

          if len(races) == 0:
              raise SystemExit("races must not be empty")

          explained_race_count = 0
          total_score_detail_count = 0

          for index, race in enumerate(races, start=1):
              if not isinstance(race, dict):
                  raise SystemExit(f"race[{index}] must be an object")

              if "score_explanation" not in race:
                  raise SystemExit(f"race[{index}] missing score_explanation")

              if "score_details" not in race:
                  raise SystemExit(f"race[{index}] missing score_details")

              score_explanation = race["score_explanation"]
              score_details = race["score_details"]

              if not isinstance(score_explanation, dict):
                  raise SystemExit(f"race[{index}].score_explanation must be an object")

              if not isinstance(score_details, list):
                  raise SystemExit(f"race[{index}].score_details must be a list")

              if len(score_details) < 3:
                  raise SystemExit(
                      f"race[{index}].score_details must contain at least 3 boats"
                  )

              required_explanation_keys = [
                  "favorite_boat_no",
                  "rival_boat_no",
                  "darkhorse_boat_no",
                  "summary",
                  "score_method",
                  "top_summary",
                  "score_details",
              ]

              missing_explanation = [
                  key for key in required_explanation_keys
                  if key not in score_explanation
              ]

              if missing_explanation:
                  raise SystemExit(
                      f"race[{index}] missing score_explanation keys: {missing_explanation}"
                  )

              for detail_index, detail in enumerate(score_details, start=1):
                  required_detail_keys = [
                      "rank",
                      "boat_no",
                      "racer_name",
                      "score",
                      "national_win_rate",
                      "local_win_rate",
                      "st_timing",
                      "reason",
                  ]

                  missing_detail = [
                      key for key in required_detail_keys
                      if key not in detail
                  ]

                  if missing_detail:
                      raise SystemExit(
                          f"race[{index}].score_details[{detail_index}] missing keys: {missing_detail}"
                      )

              explained_race_count += 1
              total_score_detail_count += len(score_details)

          if explained_race_count == 0:
              raise SystemExit("No explained races found")

          print("prediction.json explanations: OK")
          print(f"run_key: {data.get('run_key')}")
          print(f"target_date: {data.get('target_date')}")
          print(f"races: {len(races)}")
          print(f"explained_races: {explained_race_count}")
          print(f"total_score_details: {total_score_detail_count}")
          print(f"explainability: {explainability}")
          PY

      - name: Show explanation preview
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("docs/prediction.json").read_text(encoding="utf-8"))

          print("Explainability:")
          print(json.dumps(data.get("explainability"), ensure_ascii=False, indent=2))

          races = data.get("races") or []
          if races:
              first = races[0]
              preview = {
                  "race_no": first.get("race_no") or first.get("raceNo"),
                  "prediction_summary": first.get("prediction_summary"),
                  "score_explanation": first.get("score_explanation"),
                  "score_details_first_3": (first.get("score_details") or [])[:3],
              }
              print("\nFirst race explanation preview:")
              print(json.dumps(preview, ensure_ascii=False, indent=2)[:6000])
          PY

      - name: STEP 75 check
        run: |
          echo "STEP 75 CHECK: OK"
