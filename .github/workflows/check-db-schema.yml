name: Check database schema

on:
  push:
    paths:
      - "db/schema.sql"
      - "docs/database_design.md"
      - ".github/workflows/check-db-schema.yml"
  pull_request:
    paths:
      - "db/schema.sql"
      - "docs/database_design.md"
      - ".github/workflows/check-db-schema.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Show sqlite3 version
        run: |
          sqlite3 --version

      - name: Check required files
        run: |
          test -f db/schema.sql
          test -f docs/database_design.md
          echo "OK: required files exist"

      - name: Create SQLite database from schema
        run: |
          mkdir -p db
          rm -f db/check_boatrace.sqlite3
          sqlite3 db/check_boatrace.sqlite3 < db/schema.sql
          echo "OK: schema.sql executed successfully"

      - name: Show tables and views
        run: |
          sqlite3 db/check_boatrace.sqlite3 "
          SELECT name, type
          FROM sqlite_master
          WHERE type IN ('table', 'view')
          ORDER BY type, name;
          "

      - name: Check required tables
        run: |
          REQUIRED_TABLES="
          venues
          races
          racers
          race_entries
          odds_snapshots
          prediction_runs
          predictions
          prediction_tickets
          race_results
          alert_events
          export_logs
          "

          for TABLE in $REQUIRED_TABLES; do
            COUNT=$(sqlite3 db/check_boatrace.sqlite3 "SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='$TABLE';")
            if [ "$COUNT" != "1" ]; then
              echo "NG: missing table: $TABLE"
              exit 1
            fi
            echo "OK: table exists: $TABLE"
          done

      - name: Check required views
        run: |
          REQUIRED_VIEWS="
          v_race_overview
          v_prediction_ticket_results
          v_prediction_run_summary
          "

          for VIEW in $REQUIRED_VIEWS; do
            COUNT=$(sqlite3 db/check_boatrace.sqlite3 "SELECT COUNT(*) FROM sqlite_master WHERE type='view' AND name='$VIEW';")
            if [ "$COUNT" != "1" ]; then
              echo "NG: missing view: $VIEW"
              exit 1
            fi
            echo "OK: view exists: $VIEW"
          done

      - name: Foreign key check
        run: |
          RESULT=$(sqlite3 db/check_boatrace.sqlite3 "PRAGMA foreign_key_check;")
          if [ -n "$RESULT" ]; then
            echo "NG: foreign key check failed"
            echo "$RESULT"
            exit 1
          fi
          echo "OK: foreign key check passed"

      - name: STEP 61 result
        run: |
          echo "STEP 61 CHECK: OK"
