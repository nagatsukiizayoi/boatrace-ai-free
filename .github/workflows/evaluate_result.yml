name: Evaluate Result

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evaluate-result:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Evaluate prediction result
        run: python src/evaluate_result.py

      - name: Update evaluation history
        run: python src/update_history.py

      - name: Generate charts page
        run: python src/generate_charts.py

      - name: Commit evaluation files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/evaluation.json docs/evaluation.html docs/evaluation_history.json docs/history.html docs/charts.html
          git commit -m "Update evaluation result history and charts" || echo "No changes to commit"
          git push
