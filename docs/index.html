<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競艇AI予想</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f5f8;
      color: #222;
    }

    header {
      background: #005bac;
      color: white;
      padding: 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 13px;
    }

    main {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      border-left: 5px solid #005bac;
      padding-left: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
      font-size: 15px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .rank {
      display: flex;
      align-items: center;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      background: #f7f9fc;
    }

    .rank-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #005bac;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
    }

    .boat-number {
      font-size: 22px;
      font-weight: bold;
      margin-right: 8px;
    }

    .confidence {
      margin-left: auto;
      font-size: 13px;
      color: #666;
    }

    .tickets {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .ticket {
      background: #eaf3ff;
      padding: 14px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      color: #003f7d;
    }

    .notice {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>競艇AI予想</h1>
    <p>データ分析による予想練習ページ</p>
  </header>

  <main>

    <section class="card">
      <h2>レース情報</h2>

      <div class="info-row">
        <span>開催日</span>
        <strong>2026-05-13</strong>
      </div>

      <div class="info-row">
        <span>場名</span>
        <strong>桐生</strong>
      </div>

      <div class="info-row">
        <span>レース</span>
        <strong>12R</strong>
      </div>
    </section>

    <section class="card">
      <h2>AI予想順位</h2>

      <div class="rank">
        <div class="rank-number">1</div>
        <div>
          <div><span class="boat-number">1号艇</span></div>
          <div>1着候補</div>
        </div>
        <div class="confidence">信頼度 72%</div>
      </div>

      <div class="rank">
        <div class="rank-number">2</div>
        <div>
          <div><span class="boat-number">2号艇</span></div>
          <div>2着候補</div>
        </div>
        <div class="confidence">信頼度 58%</div>
      </div>

      <div class="rank">
        <div class="rank-number">3</div>
        <div>
          <div><span class="boat-number">3号艇</span></div>
          <div>3着候補</div>
        </div>
        <div class="confidence">信頼度 45%</div>
      </div>
    </section>

    <section class="card">
      <h2>買い目候補</h2>

      <div class="tickets">
        <div class="ticket">1 - 2 - 3</div>
        <div class="ticket">1 - 3 - 2</div>
        <div class="ticket">2 - 1 - 3</div>
      </div>
    </section>

    <section class="card">
      <h2>注意</h2>
      <p class="notice">
        このページは学習用のサンプルです。表示されている予想は仮のデータです。
        実際の的中や利益を保証するものではありません。
      </p>
    </section>

  </main>

  <footer>
    boatrace-ai-free
  </footer>

</body>
</html>
