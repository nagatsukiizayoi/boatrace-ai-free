<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ボートレースAI予想</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 28px 16px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    header p {
      margin: 8px 0 0;
      opacity: 0.9;
    }

    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 22px;
      border-left: 6px solid #2563eb;
      padding-left: 10px;
    }

    .race-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .info-box {
      background: #f9fafb;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
    }

    .info-label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .info-value {
      font-weight: bold;
      font-size: 18px;
    }

    .prediction-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .prediction-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #ffffff;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
    }

    .prediction-card.top {
      border: 2px solid #ef4444;
      background: #fff7f7;
    }

    .rank {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .mark-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mark-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #ef4444;
      color: white;
      font-size: 26px;
      font-weight: bold;
      line-height: 1;
    }

    .mark-name {
      font-size: 18px;
      font-weight: bold;
      color: #111827;
    }

    .boat-line {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .boat-number {
      display: inline-block;
      background: #111827;
      color: white;
      padding: 4px 8px;
      border-radius: 8px;
      margin-right: 8px;
    }

    .detail-list {
      margin: 0;
      padding: 0;
      list-style: none;
      color: #374151;
      font-size: 14px;
    }

    .detail-list li {
      margin: 4px 0;
    }

    .confidence-wrap {
      margin-top: 12px;
    }

    .confidence-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .confidence-bar {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .confidence-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      border-radius: 999px;
    }

    .ticket-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .ticket {
      background: #0f172a;
      color: white;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 13px;
    }

    td {
      font-size: 14px;
    }

    .rank-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: bold;
    }

    .mark-table {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: bold;
    }

    .mark-table-icon {
      color: #ef4444;
      font-size: 20px;
    }

    .score {
      font-weight: bold;
      color: #dc2626;
    }

    .loading {
      color: #6b7280;
      text-align: center;
      padding: 24px;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 14px;
      border-radius: 12px;
    }

    footer {
      text-align: center;
      color: #6b7280;
      padding: 24px 16px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <header>
    <h1>ボートレースAI予想</h1>
    <p>出走データからAI風に予想順位・印・買い目を表示します</p>
  </header>

  <main>
    <section class="section">
      <h2>レース情報</h2>
      <div id="raceInfo" class="race-info">
        <div class="info-box">
          <div class="info-label">状態</div>
          <div class="info-value">読み込み中...</div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>予想順位</h2>
      <div id="predictions" class="prediction-grid">
        <div class="loading">予想を読み込み中...</div>
      </div>
    </section>

    <section class="section">
      <h2>買い目候補</h2>
      <div id="tickets" class="ticket-list">
        <div class="loading">買い目を読み込み中...</div>
      </div>
    </section>

    <section class="section">
      <h2>全艇評価</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>順位</th>
              <th>印</th>
              <th>艇番</th>
              <th>選手名</th>
              <th>コース</th>
              <th>勝率</th>
              <th>モーター率</th>
              <th>平均ST</th>
              <th>スコア</th>
              <th>信頼度</th>
            </tr>
          </thead>
          <tbody id="allBoats">
            <tr>
              <td colspan="10">読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    このページは学習用のAI予想サンプルです。舟券購入は自己責任で行ってください。
  </footer>

  <script>
    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clampNumber(value, min, max) {
      const number = Number(value);

      if (Number.isNaN(number)) {
        return min;
      }

      return Math.min(Math.max(number, min), max);
    }

    function formatNumber(value, digits) {
      const number = Number(value);

      if (Number.isNaN(number)) {
        return "-";
      }

      return number.toFixed(digits);
    }

    function renderRaceInfo(data) {
      const raceInfo = document.getElementById("raceInfo");
      const race = data.race || {};

      const place = race.place || "未設定";
      const raceNo = race.race_no || "未設定";
      const title = race.title || "AI予想";
      const generatedAt = data.generated_at || "-";

      raceInfo.innerHTML = `
        <div class="info-box">
          <div class="info-label">場名</div>
          <div class="info-value">${escapeHtml(place)}</div>
        </div>
        <div class="info-box">
          <div class="info-label">レース</div>
          <div class="info-value">${escapeHtml(raceNo)}</div>
        </div>
        <div class="info-box">
          <div class="info-label">タイトル</div>
          <div class="info-value">${escapeHtml(title)}</div>
        </div>
        <div class="info-box">
          <div class="info-label">更新日時</div>
          <div class="info-value">${escapeHtml(generatedAt)}</div>
        </div>
      `;
    }

    function renderPredictions(predictions) {
      const container = document.getElementById("predictions");

      if (!Array.isArray(predictions) || predictions.length === 0) {
        container.innerHTML = '<div class="error">予想データがありません。</div>';
        return;
      }

      container.innerHTML = "";

      predictions.forEach((item) => {
        const div = document.createElement("div");
        div.className = "prediction-card";

        if (item.rank === 1) {
          div.classList.add("top");
        }

        const rank = item.rank ?? "-";
        const mark = item.mark ?? "";
        const markName = item.mark_name ?? "";
        const boat = item.boat ?? "-";
        const course = item.course ?? "-";
        const driver = item.driver ?? "選手名なし";
        const label = item.label ?? `${rank}着候補`;
        const confidence = clampNumber(item.confidence ?? 0, 0, 100);
        const score = item.score ?? "-";

        div.innerHTML = `
          <div class="rank">${escapeHtml(label)}</div>

          <div class="mark-row">
            <span class="mark-icon">${escapeHtml(mark)}</span>
            <span class="mark-name">${escapeHtml(markName)}</span>
          </div>

          <div class="boat-line">
            <span class="boat-number">${escapeHtml(boat)}号艇</span>
            ${escapeHtml(driver)}
          </div>

          <ul class="detail-list">
            <li>順位：${escapeHtml(rank)}位</li>
            <li>コース：${escapeHtml(course)}コース</li>
            <li>スコア：${escapeHtml(formatNumber(score, 2))}</li>
          </ul>

          <div class="confidence-wrap">
            <div class="confidence-label">
              <span>信頼度</span>
              <span>${escapeHtml(confidence)}%</span>
            </div>
            <div class="confidence-bar">
              <div class="confidence-fill" style="width: ${confidence}%"></div>
            </div>
          </div>
        `;

        container.appendChild(div);
      });
    }

    function renderTickets(tickets) {
      const container = document.getElementById("tickets");

      if (!Array.isArray(tickets) || tickets.length === 0) {
        container.innerHTML = '<div class="error">買い目データがありません。</div>';
        return;
      }

      container.innerHTML = "";

      tickets.forEach((ticket) => {
        const div = document.createElement("div");
        div.className = "ticket";
        div.textContent = ticket;
        container.appendChild(div);
      });
    }

    function renderAllBoats(boats) {
      const tbody = document.getElementById("allBoats");

      if (!Array.isArray(boats) || boats.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10">全艇評価を読み込めませんでした。</td></tr>';
        return;
      }

      tbody.innerHTML = "";

      boats.forEach((boat) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td><span class="rank-badge">${escapeHtml(boat.rank ?? "-")}位</span></td>
          <td>
            <span class="mark-table">
              <span class="mark-table-icon">${escapeHtml(boat.mark ?? "")}</span>
              <span>${escapeHtml(boat.mark_name ?? "")}</span>
            </span>
          </td>
          <td>${escapeHtml(boat.boat ?? "-")}号艇</td>
          <td>${escapeHtml(boat.driver ?? "-")}</td>
          <td>${escapeHtml(boat.course ?? "-")}</td>
          <td>${escapeHtml(formatNumber(boat.win_rate, 2))}</td>
          <td>${escapeHtml(formatNumber(boat.motor_rate, 1))}%</td>
          <td>${escapeHtml(formatNumber(boat.avg_st, 2))}</td>
          <td class="score">${escapeHtml(formatNumber(boat.score, 2))}</td>
          <td>${escapeHtml(boat.confidence ?? "-")}%</td>
        `;

        tbody.appendChild(tr);
      });
    }

    async function loadPrediction() {
      try {
        const response = await fetch(`prediction.json?v=${Date.now()}`);

        if (!response.ok) {
          throw new Error("prediction.json を読み込めませんでした。");
        }

        const data = await response.json();

        renderRaceInfo(data);
        renderPredictions(data.predictions || []);
        renderTickets(data.tickets || []);
        renderAllBoats(data.all_boats || data.predictions || []);
      } catch (error) {
        console.error(error);

        document.getElementById("raceInfo").innerHTML = `
          <div class="error">
            prediction.json の読み込みに失敗しました。
          </div>
        `;

        document.getElementById("predictions").innerHTML = `
          <div class="error">
            予想を表示できませんでした。
          </div>
        `;

        document.getElementById("tickets").innerHTML = `
          <div class="error">
            買い目を表示できませんでした。
          </div>
        `;

        document.getElementById("allBoats").innerHTML = `
          <tr>
            <td colspan="10">全艇評価を読み込めませんでした。</td>
          </tr>
        `;
      }
    }

    loadPrediction();
  </script>
</body>
</html>
