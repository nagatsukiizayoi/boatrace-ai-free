<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競艇AI予想</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f5f8;
      color: #222;
    }

    header {
      background: #005bac;
      color: white;
      padding: 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 13px;
    }

    main {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      border-left: 5px solid #005bac;
      padding-left: 8px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
      font-size: 15px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .rank {
      display: flex;
      align-items: center;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      background: #f7f9fc;
    }

    .rank-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #005bac;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
    }

    .boat-number {
      font-size: 22px;
      font-weight: bold;
      margin-right: 8px;
    }

    .confidence {
      margin-left: auto;
      font-size: 13px;
      color: #666;
    }

    .tickets {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .ticket {
      background: #eaf3ff;
      padding: 14px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      color: #003f7d;
    }

    .notice {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }

    .error {
      background: #fff0f0;
      color: #b00020;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>競艇AI予想</h1>
    <p>JSONデータ読み込み版</p>
  </header>

  <main>

    <section class="card">
      <h2>レース情報</h2>

      <div class="info-row">
        <span>開催日</span>
        <strong id="race-date">読み込み中...</strong>
      </div>

      <div class="info-row">
        <span>場名</span>
        <strong id="race-stadium">読み込み中...</strong>
      </div>

      <div class="info-row">
        <span>レース</span>
        <strong id="race-no">読み込み中...</strong>
      </div>

      <div class="info-row">
        <span>更新時刻</span>
        <strong id="updated-at">読み込み中...</strong>
      </div>
    </section>

    <section class="card">
      <h2>AI予想順位</h2>
      <div id="prediction-list" class="loading">
        予想データを読み込み中...
      </div>
    </section>

    <section class="card">
      <h2>買い目候補</h2>
      <div id="ticket-list" class="tickets">
      </div>
    </section>

    <section class="card">
      <h2>注意</h2>
      <p id="notice" class="notice">
        読み込み中...
      </p>
    </section>

  </main>

  <footer>
    boatrace-ai-free
  </footer>

  <script>
    async function loadPrediction() {
      try {
        const response = await fetch("prediction.json?time=" + new Date().getTime());

        if (!response.ok) {
          throw new Error("prediction.jsonを読み込めませんでした");
        }

        const data = await response.json();

        document.getElementById("race-date").textContent = data.race.date;
        document.getElementById("race-stadium").textContent = data.race.stadium;
        document.getElementById("race-no").textContent = data.race.race_no;
        document.getElementById("updated-at").textContent = data.updated_at;

        const predictionList = document.getElementById("prediction-list");
        predictionList.innerHTML = "";

        data.predictions.forEach(function(item) {
          const rankDiv = document.createElement("div");
          rankDiv.className = "rank";

          rankDiv.innerHTML = `
            <div class="rank-number">${item.rank}</div>
            <div>
              <div><span class="boat-number">${item.boat}号艇</span></div>
              <div>${item.label}</div>
            </div>
            <div class="confidence">信頼度 ${item.confidence}%</div>
          `;

          predictionList.appendChild(rankDiv);
        });

        const ticketList = document.getElementById("ticket-list");
        ticketList.innerHTML = "";

        data.tickets.forEach(function(ticket) {
          const ticketDiv = document.createElement("div");
          ticketDiv.className = "ticket";
          ticketDiv.textContent = ticket.split("-").join(" - ");
          ticketList.appendChild(ticketDiv);
        });

        document.getElementById("notice").textContent = data.notice;

      } catch (error) {
        document.getElementById("prediction-list").innerHTML = `
          <div class="error">
            データの読み込みに失敗しました。<br>
            docs/prediction.json が存在するか確認してください。
          </div>
        `;

        console.error(error);
      }
    }

    loadPrediction();
  </script>

</body>
</html>
